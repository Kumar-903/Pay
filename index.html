<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay — Bharadwaj Boys Hostel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#f7f6f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .box{background:#fff;border-radius:16px;padding:30px 22px;text-align:center;width:100%;max-width:340px;box-shadow:0 4px 28px rgba(0,0,0,0.10)}
  h2{font-size:17px;color:#1a1a18;font-weight:600;margin-bottom:2px}
  .sub{font-size:12px;color:#6b6b67;margin-bottom:18px}
  .amount{font-size:34px;font-weight:700;color:#1d9e75;margin-bottom:4px}
  .upi-id{font-size:12px;color:#6b6b67;background:#f7f6f2;padding:5px 12px;border-radius:6px;display:inline-block;font-family:monospace;margin-bottom:22px}
  .qr-label{font-size:12px;color:#6b6b67;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .qr-wrap{display:inline-block;padding:14px;background:#fff;border:2px solid #e0e0dd;border-radius:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
  .qr-wrap:hover{box-shadow:0 4px 16px rgba(0,0,0,0.13);border-color:#1d9e75}
  #qrcode canvas,#qrcode img{display:block}
  .tap-hint{font-size:12px;color:#6b6b67;margin-top:10px;line-height:1.6}
  .tap-hint strong{color:#1a1a18}
  .note{font-size:11px;color:#9b9b96;margin-top:18px;padding-top:16px;border-top:.5px solid #e0e0dd;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <h2 id="pn-text">Bharadwaj Boys Hostel</h2>
  <div class="sub">Daliganj, Lucknow</div>
  <div class="amount" id="amt-text"></div>
  <div class="upi-id" id="upi-text"></div>
  <div class="qr-label">Scan or Tap to Pay</div>
  <div class="qr-wrap" id="qr-wrap" onclick="tapToPay()" title="Tap to open your UPI app">
    <div id="qrcode"></div>
  </div>
  <div class="tap-hint">
    <strong>Scan</strong> with any camera or UPI app<br>
    <strong>Tap</strong> the QR to open your payment app directly
  </div>
  <div class="note">
    Amount is fixed — cannot be changed by payer.<br>
    If tap does not work, scan the QR with your camera.
  </div>
</div>
<script>
  const p   = new URLSearchParams(window.location.search);
  const pa  = p.get('pa') || '';
  const am  = p.get('am') || '';
  const pn  = p.get('pn') || 'Bharadwaj Boys Hostel';
  const tn  = p.get('tn') || 'Hostel Payment';

  if(!pa || !am){
    document.querySelector('.box').innerHTML = '<p style="color:#a32d2d;padding:20px;font-family:sans-serif">Invalid payment link. Please contact the hostel.</p>';
    throw new Error('Missing params');
  }

  document.getElementById('amt-text').textContent = 'Rs.' + parseFloat(am).toLocaleString('en-IN');
  document.getElementById('upi-text').textContent  = 'UPI: ' + pa;
  document.getElementById('pn-text').textContent   = pn;

  // UPI string with amount embedded — payer cannot change it
  const upiStr = 'upi://pay?pa='+encodeURIComponent(pa)+'&pn='+encodeURIComponent(pn)+'&am='+am+'&cu=INR&tn='+encodeURIComponent(tn);

  // Generate QR code
  new QRCode(document.getElementById('qrcode'), {
    text: upiStr,
    width: 210,
    height: 210,
    colorDark: '#1a1a18',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // Tap QR to open payment app (works on Android)
  function tapToPay(){
    window.location.href = upiStr;
  }
</script>
</body>
</html>
