<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pay — Bharadwaj Boys Hostel</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:sans-serif;background:#f7f6f2;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
  .box{background:#fff;border-radius:16px;padding:30px 22px;text-align:center;width:100%;max-width:340px;box-shadow:0 4px 28px rgba(0,0,0,0.10)}
  h2{font-size:17px;color:#1a1a18;font-weight:600;margin-bottom:2px}
  .sub{font-size:12px;color:#6b6b67;margin-bottom:18px}
  .amount{font-size:34px;font-weight:700;color:#1d9e75;margin-bottom:4px}
  .upi-id{font-size:12px;color:#6b6b67;background:#f7f6f2;padding:5px 12px;border-radius:6px;display:inline-block;font-family:monospace;margin-bottom:22px}
  .qr-label{font-size:12px;color:#6b6b67;margin-bottom:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
  .qr-wrap{display:inline-block;padding:14px;background:#fff;border:2px solid #e0e0dd;border-radius:14px;cursor:pointer;transition:box-shadow .15s,border-color .15s}
  .qr-wrap:hover{box-shadow:0 4px 16px rgba(0,0,0,0.13);border-color:#1d9e75}
  #qrcode canvas,#qrcode img,#hosted-qr{display:block}
  #hosted-qr{width:210px;height:210px;object-fit:contain;border-radius:4px}
  .tap-hint{font-size:12px;color:#6b6b67;margin-top:10px;line-height:1.6}
  .tap-hint strong{color:#1a1a18}
  .badge{display:inline-block;background:#e1f5ee;color:#085041;font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;margin-bottom:16px}
  .note{font-size:11px;color:#9b9b96;margin-top:18px;padding-top:16px;border-top:.5px solid #e0e0dd;line-height:1.6}
</style>
</head>
<body>
<div class="box">
  <h2 id="pn-text">Bharadwaj Boys Hostel</h2>
  <div class="sub">Daliganj, Lucknow</div>
  <div class="amount" id="amt-text"></div>
  <div id="upi-badge"></div>

  <div class="qr-label">Scan or Tap to Pay</div>
  <div class="qr-wrap" id="qr-wrap" onclick="tapToPay()" title="Tap to open your UPI app">
    <div id="qrcode"></div>
    <img id="hosted-qr" src="" alt="QR Code" style="display:none">
  </div>
  <div class="tap-hint">
    <strong>Scan</strong> with any camera or UPI app<br>
    <strong>Tap</strong> the QR to open your payment app (Android)
  </div>
  <div class="note" id="note-text">Amount is fixed and cannot be changed by payer.</div>
</div>

<script>
  const p      = new URLSearchParams(window.location.search);
  const pa     = p.get('pa') || '';       // UPI ID (may be empty if QR-only)
  const am     = p.get('am') || '';       // Amount (always present)
  const pn     = p.get('pn') || 'Bharadwaj Boys Hostel';
  const tn     = p.get('tn') || 'Hostel Payment';
  const useqr  = p.get('useqr') === '1'; // True = try to load hosted qr.png

  if(!am){
    document.querySelector('.box').innerHTML='<p style="color:#a32d2d;padding:20px;font-family:sans-serif">Invalid payment link. Please contact the hostel.</p>';
    throw new Error('Missing amount');
  }

  // Display amount
  document.getElementById('amt-text').textContent='Rs.'+parseFloat(am).toLocaleString('en-IN');
  document.getElementById('pn-text').textContent=pn;

  // Show UPI ID badge if available
  if(pa){
    document.getElementById('upi-badge').innerHTML='<div class="upi-id">UPI: '+pa+'</div>';
  }

  // UPI string for tap-to-pay and generated QR
  const upiStr = pa ? 'upi://pay?pa='+encodeURIComponent(pa)+'&pn='+encodeURIComponent(pn)+'&am='+am+'&cu=INR&tn='+encodeURIComponent(tn) : '';

  function tapToPay(){
    if(upiStr) window.location.href=upiStr;
    else alert('Scan the QR code with your UPI app to pay.');
  }

  // ── QR DISPLAY LOGIC ────────────────────────────────────────────────
  // Priority 1: useqr=1 AND qr.png exists on this domain → show hosted QR (no Rs.2000 limit)
  // Priority 2: UPI ID present → generate dynamic QR
  // Priority 3: Neither → show error

  if(useqr){
    // Try loading the hosted qr.png from the same GitHub Pages repo
    const hostedImg = document.getElementById('hosted-qr');
    hostedImg.onload = function(){
      // Successfully loaded hosted QR — show it
      document.getElementById('qrcode').style.display='none';
      hostedImg.style.display='block';
      document.getElementById('note-text').textContent=
        'This is your bank\'s merchant QR — amount is pre-set. Scan with any UPI app.';
      if(!pa){
        // QR-only mode — disable tap (no UPI ID to deep-link to)
        document.getElementById('qr-wrap').style.cursor='default';
        document.getElementById('qr-wrap').onclick=null;
        document.querySelector('.tap-hint').textContent='Scan the QR with any UPI app to pay.';
      }
    };
    hostedImg.onerror = function(){
      // Hosted QR not found — fall back to generated QR
      hostedImg.style.display='none';
      generateQR();
    };
    // Attempt to load from same domain (GitHub Pages repo root)
    hostedImg.src = './qr.png';
  } else {
    generateQR();
  }

  function generateQR(){
    if(!upiStr){
      document.querySelector('.box').innerHTML='<p style="color:#a32d2d;padding:20px;font-family:sans-serif">No payment method configured. Please contact the hostel.</p>';
      return;
    }
    // Generate dynamic QR from UPI string
    // Note: dynamically generated QR may have Rs.2000 P2P limit per NPCI rules
    new QRCode(document.getElementById('qrcode'),{
      text: upiStr,
      width: 210,
      height: 210,
      colorDark: '#1a1a18',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  }
</script>
</body>
</html>
