<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting to Payment...</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f7f6f2; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { background: #fff; border-radius: 12px; padding: 36px 28px; text-align: center; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 18px; color: #1a1a18; margin-bottom: 8px; }
  p { font-size: 13px; color: #6b6b67; margin-bottom: 20px; line-height: 1.6; }
  .amount { font-size: 28px; font-weight: 700; color: #1d9e75; margin-bottom: 4px; }
  .upi { font-size: 13px; color: #6b6b67; margin-bottom: 24px; font-family: monospace; }
  .btn { display: inline-block; background: #1a1a18; color: #fff; padding: 12px 28px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 500; margin-bottom: 10px; width: 100%; }
  .btn-g { background: #1a73e8; }
  .btn-p { background: #5f259f; }
  .btn-t { background: #00baf2; }
  .note { font-size: 11px; color: #9b9b96; margin-top: 16px; line-height: 1.5; }
  .apps { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">💳</div>
  <h2>Bharadwaj Boys Hostel</h2>
  <div class="amount" id="amt">Loading...</div>
  <div class="upi" id="upi-display"></div>
  <p id="note-text">Tap the button for your UPI app to open automatically</p>

  <div class="apps">
    <a class="btn btn-g" id="gpay-btn" href="#">Open in GPay</a>
    <a class="btn btn-p" id="phonepay-btn" href="#">Open in PhonePe</a>
    <a class="btn btn-t" id="paytm-btn" href="#">Open in Paytm</a>
    <a class="btn" id="any-btn" href="#">Open in any UPI App</a>
  </div>

  <div class="note" id="footer-note">
    If buttons don't work, open your UPI app manually and pay to the UPI ID shown above.
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pa  = params.get('pa')  || '';
  const am  = params.get('am')  || '';
  const pn  = params.get('pn')  || 'Bharadwaj Boys Hostel';
  const tn  = params.get('tn')  || 'Hostel Payment';
  const cu  = 'INR';

  const upiBase = `upi://pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}&am=${am}&cu=${cu}&tn=${encodeURIComponent(tn)}`;

  document.getElementById('amt').textContent = am ? 'Rs.' + parseFloat(am).toLocaleString('en-IN') : '';
  document.getElementById('upi-display').textContent = pa ? 'UPI ID: ' + pa : '';

  document.getElementById('gpay-btn').href     = `gpay://upi/pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}&am=${am}&cu=${cu}&tn=${encodeURIComponent(tn)}`;
  document.getElementById('phonepay-btn').href = `phonepe://pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}&am=${am}&cu=${cu}&tn=${encodeURIComponent(tn)}`;
  document.getElementById('paytm-btn').href    = `paytmmp://pay?pa=${encodeURIComponent(pa)}&pn=${encodeURIComponent(pn)}&am=${am}&cu=${cu}&tn=${encodeURIComponent(tn)}`;
  document.getElementById('any-btn').href      = upiBase;

  // Auto-redirect to universal UPI link after 1.5 seconds
  setTimeout(() => { window.location.href = upiBase; }, 1500);
</script>
</body>
</html>
